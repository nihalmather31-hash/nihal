<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Local Tourism Management</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: #0a1628;
            color: white;
            position: relative;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-scene {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-sky {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                    #0a1628 0%,
                    #0d2545 20%,
                    #1a4a6e 45%,
                    #2d6a4f 70%,
                    #1b4332 100%);
        }

        .stars {
            position: absolute;
            inset: 0;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
            animation-delay: var(--delay, 0s);
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        .mountains {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 55%;
        }

        .mountain-back,
        .mountain-front {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .mountain-back {
            height: 100%;
        }

        .mountain-front {
            height: 60%;
        }

        .mountain-back svg,
        .mountain-front svg {
            width: 100%;
            height: 100%;
        }

        .particles {
            position: absolute;
            inset: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 220, 100, 0.7);
            box-shadow: 0 0 6px rgba(255, 220, 100, 0.8);
            animation: float-particle var(--dur, 8s) ease-in-out infinite;
            animation-delay: var(--delay, 0s);
        }

        @keyframes float-particle {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            80% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-120px) translateX(var(--drift, 30px)) scale(0.5);
                opacity: 0;
            }
        }

        .aurora {
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 50%;
            background: linear-gradient(180deg,
                    transparent 0%, rgba(32, 178, 170, 0.08) 30%,
                    rgba(64, 224, 208, 0.12) 50%, rgba(32, 178, 170, 0.06) 70%, transparent 100%);
            animation: aurora-move 12s ease-in-out infinite alternate;
            filter: blur(20px);
        }

        @keyframes aurora-move {
            0% {
                transform: translateX(-10%) skewX(-5deg);
                opacity: 0.5;
            }

            100% {
                transform: translateX(10%) skewX(5deg);
                opacity: 1;
            }
        }

        .moon {
            position: absolute;
            top: 8%;
            right: 12%;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fffde7, #ffd54f);
            box-shadow: 0 0 30px rgba(255, 213, 79, 0.4), 0 0 60px rgba(255, 213, 79, 0.2);
            animation: moon-glow 4s ease-in-out infinite alternate;
        }

        @keyframes moon-glow {
            0% {
                box-shadow: 0 0 30px rgba(255, 213, 79, 0.4), 0 0 60px rgba(255, 213, 79, 0.2);
            }

            100% {
                box-shadow: 0 0 40px rgba(255, 213, 79, 0.6), 0 0 80px rgba(255, 213, 79, 0.3);
            }
        }

        /* ===== LAYOUT ===== */
        .page-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2.5rem 2rem 1rem;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #a8d8ea 50%, #7ec8a4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInDown 0.8s ease-out;
        }

        .subtitle {
            font-size: 0.95rem;
            margin-top: 0.5rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            animation: fadeInDown 0.8s ease-out 0.1s both;
        }

        /* ===== FORM ===== */
        .registration-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 1rem 2rem 3rem;
        }

        .registration-form {
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.07);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.6s ease-out;
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.3rem;
            color: white;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .input-group label {
            font-size: 0.82rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 0.3px;
        }

        .input-group label .required {
            color: #ff8a80;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            padding: 0.75rem 1rem;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            border-color: rgba(126, 200, 164, 0.6);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(126, 200, 164, 0.15);
        }

        .input-group input::placeholder,
        .input-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .error-message {
            color: #ff8a80;
            font-size: 0.8rem;
            margin-top: 0.2rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #7ec8a4;
            font-size: 0.95rem;
            text-align: center;
            padding: 0.9rem;
            background: rgba(126, 200, 164, 0.12);
            border: 1px solid rgba(126, 200, 164, 0.3);
            border-radius: 10px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .register-button {
            background: linear-gradient(135deg, #2d6a4f, #40916c);
            color: white;
            border: none;
            padding: 0.85rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(45, 106, 79, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 0.3rem;
        }

        .register-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(45, 106, 79, 0.5);
            background: linear-gradient(135deg, #40916c, #52b788);
        }

        .register-button:active {
            transform: translateY(0);
        }

        .register-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            text-align: center;
            margin-top: 0.3rem;
        }

        .back-link a {
            color: #7ec8a4;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #52b788;
            text-decoration: underline;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .registration-form {
                padding: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <!-- Animated Background Scene -->
    <div class="bg-scene">
        <div class="bg-sky"></div>
        <div class="aurora"></div>
        <div class="moon"></div>
        <div class="stars" id="stars"></div>
        <div class="particles" id="particles"></div>
        <div class="mountains">
            <div class="mountain-back">
                <svg viewBox="0 0 1440 400" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M0,400 L0,280 L120,180 L240,250 L360,140 L480,220 L600,100 L720,200 L840,130 L960,210 L1080,160 L1200,230 L1320,170 L1440,240 L1440,400 Z"
                        fill="#1a3a2a" opacity="0.7" />
                </svg>
            </div>
            <div class="mountain-front">
                <svg viewBox="0 0 1440 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M0,300 L0,220 L80,160 L160,200 L280,100 L400,170 L520,80 L640,160 L760,90 L880,160 L1000,110 L1120,180 L1240,120 L1360,190 L1440,150 L1440,300 Z"
                        fill="#0d2d1a" opacity="0.9" />
                    <path d="M520,80 L490,110 L550,110 Z" fill="rgba(255,255,255,0.6)" />
                    <path d="M760,90 L735,115 L785,115 Z" fill="rgba(255,255,255,0.5)" />
                    <path d="M280,100 L258,125 L302,125 Z" fill="rgba(255,255,255,0.4)" />
                </svg>
            </div>
        </div>
    </div>

    <div class="page-wrapper">
        <header>
            <h1>Local Tourism Management</h1>
            <p class="subtitle">Create Your Account</p>
        </header>

        <div class="registration-container">
            <form class="registration-form" id="registrationForm" onsubmit="handleRegistration(event)">
                <h2 class="form-title">User Registration</h2>

                <div class="success-message" id="successMessage">
                    ✅ Registration successful! Redirecting to login...
                </div>

                <div class="input-group">
                    <label for="username">Username <span class="required">*</span></label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required
                        minlength="3">
                    <div class="error-message" id="usernameError">Username must be at least 3 characters</div>
                </div>

                <div class="input-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                    <div class="error-message" id="emailError">Please enter a valid email</div>
                </div>

                <div class="input-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" name="password" placeholder="Choose a strong password" required
                        minlength="6">
                    <div class="error-message" id="passwordError">Password must be at least 6 characters</div>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                        placeholder="Re-enter your password" required>
                    <div class="error-message" id="confirmPasswordError">Passwords do not match</div>
                </div>

                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Your full name">
                </div>

                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Your phone number">
                </div>

                <div class="input-group">
                    <label for="address">Address</label>
                    <textarea id="address" name="address" placeholder="Your address (optional)"></textarea>
                </div>

                <button type="submit" class="register-button" id="submitBtn">Register</button>

                <div class="back-link">
                    <a href="index.html">← Back to Login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="db.js"></script>
    <script>
        // Generate stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2.5 + 0.5;
            star.style.cssText = `
                width: ${size}px; height: ${size}px;
                top: ${Math.random() * 60}%;
                left: ${Math.random() * 100}%;
                --dur: ${Math.random() * 3 + 2}s;
                --delay: ${Math.random() * 4}s;
            `;
            starsContainer.appendChild(star);
        }

        // Generate firefly particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 2;
            p.style.cssText = `
                width: ${size}px; height: ${size}px;
                bottom: ${Math.random() * 40 + 5}%;
                left: ${Math.random() * 100}%;
                --dur: ${Math.random() * 6 + 5}s;
                --delay: ${Math.random() * 8}s;
                --drift: ${(Math.random() - 0.5) * 60}px;
            `;
            particlesContainer.appendChild(p);
        }

        async function handleRegistration(event) {
            event.preventDefault();

            document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
            document.getElementById('successMessage').classList.remove('show');

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();

            let hasError = false;

            if (username.length < 3) {
                document.getElementById('usernameError').classList.add('show');
                hasError = true;
            }

            if (password.length < 6) {
                document.getElementById('passwordError').classList.add('show');
                hasError = true;
            }

            if (password !== confirmPassword) {
                document.getElementById('confirmPasswordError').classList.add('show');
                hasError = true;
            }

            if (hasError) return;

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';

            try {
                const response = await api.register(username, password, 'general', {
                    email, fullName, phone, address
                });

                if (response.success) {
                    document.getElementById('successMessage').classList.add('show');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    const errorEl = document.getElementById('usernameError');
                    errorEl.textContent = response.message || 'Registration failed';
                    errorEl.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Register';
                }
            } catch (error) {
                console.error('Registration error:', error);
                const errorEl = document.getElementById('usernameError');
                errorEl.textContent = 'Registration failed. Please make sure the backend server is running.';
                errorEl.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
            }
        }
    </script>
</body>

</html>
